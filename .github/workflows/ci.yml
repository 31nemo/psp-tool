name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', 'THIRD_PARTY_NOTICES.md']
  pull_request:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', 'THIRD_PARTY_NOTICES.md']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.test
          load: true
          tags: psp-toolkit-e2e:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: docker run --name psp-cso-test psp-toolkit-e2e:latest

      - name: Extract test artifacts
        if: always()
        run: |
          docker cp psp-cso-test:/app/test-results ./test-results 2>/dev/null || true
          docker cp psp-cso-test:/app/test/e2e/convert.spec.js-snapshots ./e2e-screenshots/convert 2>/dev/null || true
          docker cp psp-cso-test:/app/test/e2e/eboot.spec.js-snapshots ./e2e-screenshots/eboot 2>/dev/null || true
          docker rm psp-cso-test 2>/dev/null || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: e2e-screenshots/
          retention-days: 14

      - name: Extract dist from image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker create --name extract psp-toolkit-e2e:latest
          docker cp extract:/app/dist ./dist
          docker rm extract

      - name: Upload pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
